<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Průběžné výsledky</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:20px;
  background:#f5f5f5;
}

h1{
  text-align:center;
}

pre{
  background:white;
  padding:10px;
  border-radius:8px;
  overflow:auto;
}
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  margin-bottom:20px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
}

th{
  background:#eaeaea;
}
</style>
</head>

<body>

<h1>Průběžné výsledky</h1>

<h2>Data ze závodu</h2>
<pre id="data">Načítám...</pre>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnHKiL6ANjvRbUpd3sv4TwGuq7-4_c6J8",
  authDomain: "zkouska-2.firebaseapp.com",
  projectId: "zkouska-2",
  storageBucket: "zkouska-2.firebasestorage.app",
  messagingSenderId: "51239007198",
  appId: "1:51239007198:web:4e98cdfd91279a337da34f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function vytvorTabulku(data, elementId) {

  if (!data || data.length === 0) {
    document.getElementById(elementId).innerHTML = "Žádná data";
    return;
  }

  let html = "<table>";
  html += "<tr>";

  Object.keys(data[0]).forEach(sloupec => {
    html += `<th>${sloupec}</th>`;
  });

  html += "</tr>";

  data.forEach(radek => {
    html += "<tr>";

    Object.values(radek).forEach(hodnota => {
      html += `<td>${hodnota}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById(elementId).innerHTML = html;
}

async function nactiData() {

  const snap = await getDoc(
    doc(db, "zavody", "hlavni")
  );

  if (!snap.exists()) return;

  const data = snap.data();

  vytvorTabulku(data.starsiPU, "spu");
  vytvorTabulku(data.mladsiPU, "mpu");
  vytvorTabulku(data.starsiSD, "ssd");
  vytvorTabulku(data.mladsiSD, "msd");
}

nactiData();

</script>

</body>
</html>
