<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Průběžné výsledky</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:20px;
  background:#f5f5f5;
}

h1{
  text-align:center;
}

pre{
  background:white;
  padding:10px;
  border-radius:8px;
  overflow:auto;
}
</style>
</head>

<body>

<h1>Průběžné výsledky</h1>

<h2>Data ze závodu</h2>
<pre id="data">Načítám...</pre>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnHKiL6ANjvRbUpd3sv4TwGuq7-4_c6J8",
  authDomain: "zkouska-2.firebaseapp.com",
  projectId: "zkouska-2",
  storageBucket: "zkouska-2.firebasestorage.app",
  messagingSenderId: "51239007198",
  appId: "1:51239007198:web:4e98cdfd91279a337da34f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function nactiData() {

  const snap = await getDoc(
    doc(db, "zavody", "hlavni")
  );

  if(snap.exists()){
    document.getElementById("data").textContent =
      JSON.stringify(snap.data(), null, 2);
  } else {
    document.getElementById("data").textContent =
      "Dokument nebyl nalezen.";
  }
}

nactiData();

</script>

</body>
</html>
