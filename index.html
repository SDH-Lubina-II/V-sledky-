<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Výsledky SDH</title>

<style>

body{
font-family:Arial,sans-serif;
margin:20px;
background:#f5f5f5;
}

h1,h2,h3{
margin-top:20px;
}

.section{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:8px 12px;
margin:3px;
cursor:pointer;
}

input,textarea{
padding:6px;
margin:3px;
}

textarea{
width:100%;
height:120px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:white;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

th{
background:#ececec;
}

.hidden{
display:none;
}

.poradi1{
background:#ffd700;
}

.poradi2{
background:#d9d9d9;
}

.poradi3{
background:#f4b183;
}

</style>

</head>
<body>

<h1>Výsledky SDH</h1>

<div class="section">

<h2>Nastavení soutěže</h2>

<label>Název soutěže</label><br>
<input id="nazevSouteze" style="width:300px"><br>

<label>Datum</label><br>
<input type="date" id="datumSouteze">

</div>

<div class="section">

<button onclick="showPage('spu')">
Starší - Požární útok
</button>

<button onclick="showPage('mpu')">
Mladší - Požární útok
</button>

<button onclick="showPage('ssd')">
Starší - Štafeta dvojic
</button>

<button onclick="showPage('msd')">
Mladší - Štafeta dvojic
</button>

</div>

<div id="spu" class="section">

<h2>Starší - Požární útok</h2>

<h3>Import družstev</h3>

<textarea id="spuImport"></textarea>

<br>

<button onclick="importSPU()">
Importovat družstva
</button>

<div id="spuObsah"></div>

</div>

<div id="mpu" class="section hidden">

<h2>Mladší - Požární útok</h2>

<textarea id="mpuImport"></textarea>

<br>

<button onclick="importMPU()">
Importovat družstva
</button>

<div id="mpuObsah"></div>

</div>

<div id="ssd" class="section hidden">

<h2>Starší - Štafeta dvojic</h2>

<div id="ssdObsah"></div>

</div>

<div id="msd" class="section hidden">

<h2>Mladší - Štafeta dvojic</h2>

<div id="msdObsah"></div>

</div>

<script>

let starsiPU=[];
let mladsiPU=[];
  
function showPage(id){

document
.querySelectorAll("#spu,#mpu,#ssd,#msd")
.forEach(x=>x.classList.add("hidden"));

document
.getElementById(id)
.classList.remove("hidden");

}

function importSPU(){

const text =
document.getElementById("spuImport").value;

const radky = text.split("\n");

radky.forEach(nazev=>{

if(nazev.trim()!==""){

starsiPU.push({
start: starsiPU.length + 1,
poradi: "",
druzstvo: nazev.trim(),
lp: "",
pp: "",
vysledek: "",
np: false
});

}

});

prepocetSPU();

}
function importMPU(){

const text =
document.getElementById("mpuImport").value;

const radky = text.split("\n");

radky.forEach(nazev=>{

if(nazev.trim()!==""){

mladsiPU.push({
start: mladsiPU.length + 1,
poradi: "",
druzstvo: nazev.trim(),
lp: "",
pp: "",
vysledek: "",
np: false
});

}

});

prepocetMPU();

}

function prepocetMPU(){

mladsiPU.forEach(d=>{

if(d.np){

d.vysledek="NP";
return;

}

if(d.lp!=="" && d.pp!==""){

const lp = casNaCislo(d.lp);
const pp = casNaCislo(d.pp);

const horsi = Math.max(lp,pp);

d.vysledek =
Math.floor(horsi/100)
+ ":" +
String(horsi%100).padStart(2,"0");

}else{

d.vysledek="";

}

});

seradMPU();
vykresliMPU();

}

function seradMPU(){

const serazene =
mladsiPU
.filter(d =>
d.vysledek!=="" &&
d.vysledek!=="NP"
)
.slice();

serazene.sort((a,b)=>{

return (
casNaCislo(a.vysledek) -
casNaCislo(b.vysledek)
);

});

serazene.forEach((d,index)=>{

d.poradi=index+1;

});

mladsiPU.forEach(d=>{

if(d.vysledek==="NP"){
d.poradi="NP";
}

});

}

function vykresliMPU(){

document.getElementById("mpuObsah").innerHTML =
"<p>MPU připraveno</p>";

}
function casNaCislo(cas){

if(!cas) return 999999;

const c = cas.split(":");

if(c.length!==2) return 999999;

return parseInt(c[0])*100 +
parseInt(c[1]);

}

function prepocetSPU(){

starsiPU.forEach(d=>{

if(d.np){

d.vysledek="NP";
return;

}

if(d.lp!=="" && d.pp!==""){

const lp = casNaCislo(d.lp);
const pp = casNaCislo(d.pp);

const horsi = Math.max(lp,pp);

d.vysledek =
Math.floor(horsi/100)

+ ":" +
  String(horsi%100)
  .padStart(2,"0");

}else{

d.vysledek="";

}

});

seradSPU();
vykresliSPU();

}

function seradSPU(){

const serazene =
starsiPU
.filter(d =>
d.vysledek!=="" &&
d.vysledek!=="NP"
)
.slice();

serazene.sort((a,b)=>{

return (
casNaCislo(a.vysledek)
-
casNaCislo(b.vysledek)
);

});

serazene.forEach((d,index)=>{

d.poradi = index + 1;

});

starsiPU.forEach(d=>{

if(d.vysledek==="NP"){
d.poradi="NP";
}

});

}
  function smazSPU(index){

starsiPU.splice(index,1);

starsiPU.forEach((d,i)=>{
d.start=i+1;
});

prepocetSPU();

}

function vykresliSPU(){

let html = `

<table><tr>
<th>Start</th>
<th>Pořadí</th>
<th>Družstvo</th>
<th>LP</th>
<th>PP</th>
<th>Výsledek</th>
<th>NP</th>
<th>Akce</th>
</tr>
`;starsiPU.forEach((d,i)=>{

let trida="";

if(d.poradi===1) trida="poradi1";
if(d.poradi===2) trida="poradi2";
if(d.poradi===3) trida="poradi3";

html += `

<tr class="${trida}"><td>${d.start}</td><td>${d.poradi || ""}</td><td>${d.druzstvo}</td><td>
<input
value="${d.lp}"
onchange="
starsiPU[${i}].lp=this.value;
prepocetSPU();
">
</td><td>
<input
value="${d.pp}"
onchange="
starsiPU[${i}].pp=this.value;
prepocetSPU();
">
</td><td>${d.vysledek}</td><td>
<input
type="checkbox"
${d.np ? "checked" : ""}
onchange="
starsiPU[${i}].np=this.checked;
prepocetSPU();
">
</td><td>
<button
onclick="smazSPU(${i})">
🗑
</button>
</td></tr>
`;});

html += "</table>";

document.getElementById("spuObsah").innerHTML = html;

}

</script>
</body>
</html>
