<script type="module">

  doc,

<script>

let starsiPU=[];
let mladsiPU=[];
let starsiSD=[];
let mladsiSD=[];
  
function showPage(id){

document
.querySelectorAll("#spu,#mpu,#ssd,#msd")
.forEach(x=>x.classList.add("hidden"));

document
.getElementById(id)
.classList.remove("hidden");

}

function importSPU(){

const text =
document.getElementById("spuImport").value;

const radky = text.split("\n");

radky.forEach(nazev=>{

if(nazev.trim()!==""){

starsiPU.push({
start: starsiPU.length + 1,
poradi: "",
druzstvo: nazev.trim(),
lp: "",
pp: "",
vysledek: "",
np: false
});

}

});

prepocetSPU();

}
function importMPU(){

const text =
document.getElementById("mpuImport").value;

const radky = text.split("\n");

radky.forEach(nazev=>{

if(nazev.trim()!==""){

mladsiPU.push({
start: mladsiPU.length + 1,
poradi: "",
druzstvo: nazev.trim(),
lp: "",
pp: "",
vysledek: "",
np: false
});

}

});

prepocetMPU();

}

function importSSD(){

const text =
document.getElementById("ssdImport").value;

const radky = text.split("\n");

radky.forEach(radek=>{

const udaje = radek.split(/\t|;/);

if(udaje.length>=3){

starsiSD.push({

poradi:"",
prijmeni: udaje[0].trim(),
jmeno: udaje[1].trim(),
druzstvo:udaje[2].trim(),

cas1:"",
cas2:"",
vysledek:"",
np:false

});

}

});

prepocetSSD();

}

function prepocetSSD(){

starsiSD.forEach(d=>{

if(d.np){

d.vysledek="NP";
return;

}

if(d.cas1!=="" && d.cas2!==""){

const c1 = casNaCislo(d.cas1);
const c2 = casNaCislo(d.cas2);

const horsi = Math.max(c1,c2);

d.vysledek =
Math.floor(horsi/100)
+ ":" +
String(horsi%100).padStart(2,"0");

}else{

d.vysledek="";

}

});

seradSSD();
vykresliSSD();

}

function importMSD(){

const text =
document.getElementById("msdImport").value;

const radky = text.split("\n");

radky.forEach(radek=>{

const udaje = radek.split(/\t|;/);

if(udaje.length>=3){

mladsiSD.push({

poradi:"",
prijmeni: udaje[0].trim(),
jmeno: udaje[1].trim(),
druzstvo: udaje[2].trim(),

cas1:"",
cas2:"",
vysledek:"",
np:false

});

}

});

prepocetMSD();

}

function prepocetMSD(){

mladsiSD.forEach(d=>{

if(d.np){

d.vysledek="NP";
return;

}

if(d.cas1!="" && d.cas2!=""){

const c1 = casNaCislo(d.cas1);
const c2 = casNaCislo(d.cas2);

const horsi = Math.max(c1,c2);

d.vysledek =
Math.floor(horsi/100)
+ ":" +
String(horsi%100).padStart(2,"0");

}else{

d.vysledek="";

}

});

seradMSD();
vykresliMSD();

}
function seradMSD(){

const serazene =
mladsiSD
.filter(d =>
d.vysledek!="" &&
d.vysledek!="NP"
)
.slice();

serazene.sort((a,b)=>{

return (
casNaCislo(a.vysledek) -
casNaCislo(b.vysledek)
);

});

serazene.forEach((d,index)=>{

d.poradi=index+1;

});

mladsiSD.forEach(d=>{

if(d.vysledek==="NP"){
d.poradi="NP";
}

});

}
function vykresliMSD(){

let html = `
<table><tr>
<th>Pořadí</th>
<th>Závodník</th>
<th>Družstvo</th>
<th>1. pokus</th>
<th>2. pokus</th>
<th>Výsledek</th>
<th>NP</th>
<th>🗑️</th>
</tr>
`;

mladsiSD.forEach((d,i)=>{

let trida="";

if(d.poradi==1) trida="poradi1";
if(d.poradi==2) trida="poradi2";
if(d.poradi==3) trida="poradi3";

html += `
<tr class="${trida}">
<td>${d.poradi || ""}</td>
<td>${d.prijmeni} ${d.jmeno}</td>
<td>${d.druzstvo}</td>

<td>
<input
value="${d.cas1}"
onchange="
mladsiSD[${i}].cas1=this.value;
prepocetMSD();
">
</td>

<td>
<input
value="${d.cas2}"
onchange="
mladsiSD[${i}].cas2=this.value;
prepocetMSD();
">
</td>

<td>${d.vysledek}</td>

<td>
<input
type="checkbox"
${d.np ? "checked" : ""}
onchange="
mladsiSD[${i}].np=this.checked;
prepocetMSD();
">
</td>

<td>
<button onclick="
mladsiSD.splice(${i},1);
vykresliMSD();
">
🗑️
</button>
</td>

</tr>
`;
});

html += "</table>";

document.getElementById("msdObsah").innerHTML = html;
}

function casNaCislo(cas){

if(!cas) return 999999;

const c = cas.split(":");

if(c.length!==2) return 999999;

return parseInt(c[0])*100 +
parseInt(c[1]);

}

}

});

}
  function smazSPU(index){

});

}

🗑
