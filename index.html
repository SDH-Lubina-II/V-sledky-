<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Výsledky SDH</title>

<style>
body{
font-family:Arial,sans-serif;
margin:20px;
background:#f5f5f5;
}

h1,h2,h3{
margin-top:20px;
}

input,button,textarea{
padding:8px;
margin:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:white;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

th{
background:#eaeaea;
}

.section{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:8px;
}

.hidden{
display:none;
}

textarea{
width:100%;
height:120px;
}

.nav button{
margin-right:10px;
}
</style>
</head>
<body>

<h1>Výsledky SDH</h1>

<div class="section">
<h2>Nastavení soutěže</h2>

<label>Název soutěže:</label><br>
<input id="nazevSouteze" style="width:300px"><br>

<label>Datum:</label><br>
<input type="date" id="datumSouteze">
</div>

<div class="nav">
<button onclick="showPage('spu')">Starší - Požární útok</button>
<button onclick="showPage('ssd')">Starší - Štafeta dvojic</button>
<button onclick="showPage('mpu')">Mladší - Požární útok</button>
<button onclick="showPage('msd')">Mladší - Štafeta dvojic</button>
</div>

<div id="spu" class="section">
<h2>Starší - Požární útok</h2>

<h3>Hromadné vložení družstev</h3>

<textarea id="spuImport"></textarea><br>
<button onclick="importSPU()">Importovat družstva</button>

<div id="spuObsah"></div>
</div>

<div id="ssd" class="section hidden">
<h2>Starší - Štafeta dvojic</h2>

<textarea id="ssdImport" placeholder="Jan;Novák;Kopřivnice"></textarea><br>
<button>Importovat závodníky</button>

<div id="ssdObsah"></div>
</div>

<div id="mpu" class="section hidden">
<h2>Mladší - Požární útok</h2>

<textarea id="mpuImport"></textarea><br>
<button>Importovat družstva</button>

<div id="mpuObsah"></div>
</div>

<div id="msd" class="section hidden">
<h2>Mladší - Štafeta dvojic</h2>

<textarea id="msdImport"></textarea><br>
<button>Importovat závodníky</button>

<div id="msdObsah"></div>
</div>

<script>

let starsiPU=[];

function showPage(id){

document.querySelectorAll('.section').forEach(x=>{
if(
x.id==="spu"||
x.id==="ssd"||
x.id==="mpu"||
x.id==="msd"
){
x.classList.add("hidden");
}
});

document.getElementById(id).classList.remove("hidden");
}

function importSPU(){

const text=document.getElementById("spuImport").value;

const radky=text.split("\\n");

radky.forEach((nazev,index)=>{

if(nazev.trim()!==""){

starsiPU.push({
  start: starsiPU.length+1,
  druzstvo:nazev.trim(),
  lp:"",
  pp:"",
  np:false,
  vysledek:""
});

}

});

vykresliSPU();
}

function prepocetSPU(){

  starsiPU.forEach(d=>{

    if(d.np){
      d.vysledek="NP";
      return;
    }

    if(d.lp!=="" && d.pp!==""){

      let lp = parseInt(d.lp.replace(":",""));
let pp = parseInt(d.pp.replace(":",""));

      let horsi = Math.max(lp,pp);

d.vysledek =
Math.floor(horsi/100) +
":" +
String(horsi%100).padStart(2,"0");

    }else{
      d.vysledek="";
    }

  });

  vykresliSPU();
}
let serazene = starsiPU
.filter(d => d.vysledek !== "" && d.vysledek !== "NP")
.slice();

serazene.sort((a,b)=>{

 let ca=parseInt(a.vysledek.replace(":",""));
 let cb=parseInt(b.vysledek.replace(":",""));

 return ca-cb;

});

serazene.forEach((d,index)=>{
 d.poradi=index+1;
});

starsiPU.forEach(d=>{
 if(d.vysledek==="NP"){
   d.poradi="NP";
 }
});
function vykresliSPU(){

let html=`
<table>
<tr>
<th>Start</th>
<th>Pořadí</th>
<th>Družstvo</th>
<th>LP</th>
<th>PP</th>
<th>Výsledek</th>
<th>NP</th>
</tr>
`;

starsiPU.forEach((d,i)=>{

<td>${d.start}</td>
<td>${d.poradi || ""}</td>
<td>${d.druzstvo}</td>
<td>
<input
 value="${d.lp}"
 onchange="starsiPU[${i}].lp=this.value;prepocetSPU();">
</td>

<td>
<input
 value="${d.pp}"
 onchange="starsiPU[${i}].pp=this.value;prepocetSPU();">
</td>

<td>${d.vysledek}</td>

<td>
<input
 type="checkbox"
 ${d.np ? "checked" : ""}
 onchange="starsiPU[${i}].np=this.checked;prepocetSPU();">
</td>
</tr>
`;

});

html+="</table>";

document.getElementById("spuObsah").innerHTML=html;
}

</script>

</body>
</html>
