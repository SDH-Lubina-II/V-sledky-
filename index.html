<!DOCTYPE html><html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Výsledky SDH</title><style>
body{
font-family:Arial,sans-serif;
margin:15px;
}

button{
padding:10px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.hidden{
display:none;
}
</style></head><body><h1>Výsledky SDH</h1><button onclick="zobraz('spu')">Starší - Požární útok</button>
<button onclick="zobraz('ssd')">Starší - Štafeta dvojic</button>
<button onclick="zobraz('mpu')">Mladší - Požární útok</button>
<button onclick="zobraz('msd')">Mladší - Štafeta dvojic</button>

<div id="spu" class="hidden">
<h2>Starší - Požární útok</h2><input id="druzstvo" placeholder="Název družstva">
<input id="lp" placeholder="LP">
<input id="pp" placeholder="PP"><button onclick="pridatPU()">Přidat</button>

<table>
<thead>
<tr>
<th>Pořadí</th>
<th>Družstvo</th>
<th>LP</th>
<th>PP</th>
<th>Výsledek</th>
</tr>
</thead>
<tbody id="tabulkaPU"></tbody>
</table>
</div><script>

let pu=[];

function zobraz(id){
document.querySelectorAll('div').forEach(d=>d.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
}

function pridatPU(){

let druzstvo=document.getElementById('druzstvo').value;
let lp=parseFloat(document.getElementById('lp').value);
let pp=parseFloat(document.getElementById('pp').value);

let vysledek=Math.max(lp,pp);

pu.push({
druzstvo,
lp,
pp,
vysledek
});

pu.sort((a,b)=>a.vysledek-b.vysledek);

let html="";

pu.forEach((x,i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${x.druzstvo}</td>
<td>${x.lp}</td>
<td>${x.pp}</td>
<td>${x.vysledek}</td>
</tr>
`;
});

document.getElementById('tabulkaPU').innerHTML=html;
}

</script></body>
</html>
