<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Výsledky SDH - Dospělí</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:20px;
  background:#f5f5f5;
}

.section{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

button{
  padding:10px;
  margin:5px;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<h1>Výsledky SDH - Dospělí</h1>

<div class="section">

<button onclick="showPage('muzi')">Muži</button>
<button onclick="showPage('zeny')">Ženy</button>
<button onclick="showPage('veterani')">Veteráni 35+</button>

</div>

<div id="muzi" class="section">
<h2>Muži</h2>
<textarea style="width:100%;height:150px"></textarea>
</div>

<div id="zeny" class="section hidden">
<h2>Ženy</h2>
<textarea style="width:100%;height:150px"></textarea>
</div>

<div id="veterani" class="section hidden">
<h2>Veteráni 35+</h2>
<textarea style="width:100%;height:150px"></textarea>
</div>

<script>

function showPage(id){

  document
    .querySelectorAll('#muzi,#zeny,#veterani')
    .forEach(x => x.classList.add('hidden'));

  document
    .getElementById(id)
    .classList.remove('hidden');
}

showPage('muzi');

</script>

</body>
</html>
